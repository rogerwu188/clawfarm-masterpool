name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Solana CLI v1.18.24
        run: |
          curl -sSfL https://github.com/anza-xyz/agave/releases/download/v1.18.24/agave-x86_64-unknown-linux-gnu.tar.bz2 -o /tmp/agave.tar.bz2
          tar -xjf /tmp/agave.tar.bz2 -C "$HOME/.local/share/solana/install/"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH
          solana --version

      - name: Install Anchor CLI
        run: |
          npm install -g @coral-xyz/anchor-cli
          anchor --version

      - name: Install npm deps
        run: npm install

      - name: Build
        run: anchor build

      - name: Check outputs
        run: |
          echo "=== Deploy dir ==="
          ls -la target/deploy/ 2>/dev/null || echo "No deploy"
          find . -name "*.so" -type f 2>/dev/null || echo "No .so"

      - name: Upload artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: program-artifacts
          path: target/
