name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL 'https://release.anza.xyz/stable/install')"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Install Anchor
        run: npm install -g @coral-xyz/anchor-cli

      - name: Install dependencies
        run: npm install

      - name: Generate keypair
        run: |
          mkdir -p target/deploy
          solana-keygen new --no-passphrase -o target/deploy/clawfarm_masterpool-keypair.json

      - name: Build
        run: anchor build

      - name: Show files
        run: |
          ls -la target/deploy/

      - name: Print Program ID
        run: |
          solana-keygen pubkey target/deploy/clawfarm_masterpool-keypair.json

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: clawfarm-program
          path: target/
