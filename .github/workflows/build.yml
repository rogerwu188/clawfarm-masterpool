name: Build Anchor Program

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        run: |
          rustup update stable
          rustup default stable

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/stable/install)"

      - name: Add to PATH
        run: echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Install Anchor
        run: |
          npm install -g @coral-xyz/anchor-cli@latest

      - name: Show versions
        run: |
          solana --version
          anchor --version

      - name: Install Node.js dependencies
        run: npm install

      - name: Remove devnet program config to avoid caching issue
        run: |
          cat Anchor.toml
          # Comment out devnet program to force fresh build
          sed -i 's/^clawfarm_masterpool/ #clawfarm_masterpool/' Anchor.toml

      - name: Generate program keypair
        run: |
          mkdir -p target/deploy
          solana-keygen new --no-passphrase -o ./target/deploy/clawfarm_masterpool-keypair.json

      - name: Clean and rebuild
        run: |
          rm -rf target
          anchor build

      - name: List ALL files
        run: |
          echo "=== All files ==="
          find . -type f -name "*.so" 2>/dev/null
          find . -type f -name "*keypair*" 2>/dev/null
          ls -laR target/ 2>/dev/null | head -50

      - name: Display Program ID
        run: |
          PROGRAM_ID=$(solana address -k ./target/deploy/clawfarm_masterpool-keypair.json)
          echo "Program ID: $PROGRAM_ID"
          echo "$PROGRAM_ID" > program_id.txt

      - name: Upload ALL build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: clawfarm-masterpool-all
          path: |
            target/
            program_id.txt
          retention-days: 30
