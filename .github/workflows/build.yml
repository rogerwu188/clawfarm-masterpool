name: Build Anchor Program

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        run: |
          rustup update stable
          rustup default stable

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/stable/install)"

      - name: Add to PATH
        run: echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Install Anchor
        run: |
          npm install -g @coral-xyz/anchor-cli@latest

      - name: Show versions
        run: |
          solana --version
          anchor --version

      - name: Install Node.js dependencies
        run: npm install

      - name: Generate program keypair
        run: |
          solana-keygen new --no-passphrase -o ./target/deploy/clawfarm_masterpool-keypair.json

      - name: Build Anchor program
        run: anchor build

      - name: Show build output
        run: |
          echo "=== Files in target/deploy ==="
          ls -la target/deploy/
          echo ""
          echo "=== .so file check ==="
          ls -la target/deploy/*.so 2>/dev/null || echo "No .so files found"

      - name: Display Program ID
        run: |
          PROGRAM_ID=$(solana address -k ./target/deploy/clawfarm_masterpool-keypair.json)
          echo "Program ID: $PROGRAM_ID"
          echo "$PROGRAM_ID" > program_id.txt

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: clawfarm-masterpool-all
          path: |
            target/deploy/*.so
            target/deploy/*keypair*
            program_id.txt
          retention-days: 30
