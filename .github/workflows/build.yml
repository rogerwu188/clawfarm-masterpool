name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL 'https://release.anza.xyz/stable/install')"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Install Anchor
        run: npm install -g @coral-xyz/anchor-cli

      - name: Install dependencies
        run: npm install

      - name: Build
        run: anchor build

      - name: Generate keypair
        run: |
          solana-keygen new --no-passphrase -o deploy-keypair.json

      - name: Show keypair
        run: cat deploy-keypair.json

      - name: Show Program ID
        run: solana-keygen pubkey deploy-keypair.json

      - name: Upload keypair
        uses: actions/upload-artifact@v4
        with:
          name: deploy-keypair
          path: deploy-keypair.json

      - name: Upload IDL
        uses: actions/upload-artifact@v4
        with:
          name: program-idl
          path: target/idl/
