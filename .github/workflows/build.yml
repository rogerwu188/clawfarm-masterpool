name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL 'https://release.anza.xyz/stable/install')"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Install Anchor
        run: npm install -g @coral-xyz/anchor-cli

      - name: Install dependencies
        run: npm install

      - name: Build
        run: anchor build

      - name: Debug output
        run: |
          echo "=== Contents of target ==="
          ls -la target/ 2>/dev/null || echo "No target dir"
          echo ""
          echo "=== Contents of target/deploy ==="
          ls -la target/deploy/ 2>/dev/null || echo "No deploy dir"
          echo ""
          echo "=== Find .so files ==="
          find . -name "*.so" 2>/dev/null || echo "No .so files"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: clawfarm-program
          path: |
            target/deploy/*.so
            target/deploy/*keypair*
            target/idl/
          if-no-files-found: warn
