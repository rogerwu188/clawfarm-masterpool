name: Build Anchor Program

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        run: |
          rustup update stable
          rustup default stable

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/stable/install)"

      - name: Add to PATH
        run: echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Install Anchor
        run: |
          npm install -g @coral-xyz/anchor-cli@latest

      - name: Show versions
        run: |
          solana --version
          anchor --version

      - name: Install Node.js dependencies
        run: npm install

      - name: Setup Solana config for file-based wallet
        run: |
          # Create a temporary file-based wallet for build
          solana-keygen new --no-passphrase -o /tmp/wallet.json
          solana config set --keypair /tmp/wallet.json

      - name: Restore Anchor.toml
        run: |
          # Restore original Anchor.toml
          cat > Anchor.toml << 'EOF'
[features]
seeds = false
skip-lint = false

[programs.localnet]
clawfarm_masterpool = "CF1AwFarm111111111111111111111111111111111"

[programs.devnet]
clawfarm_masterpool = "CF1AwFarm111111111111111111111111111111111"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "devnet"
wallet = "/tmp/wallet.json"

[scripts]
test = "npx ts-mocha -p ./tsconfig.json -t 1000000 tests/**/*.ts"
EOF

      - name: Clean and rebuild
        run: |
          rm -rf target
          anchor build

      - name: List build outputs
        run: |
          echo "=== Deploy directory ==="
          ls -la target/deploy/
          echo ""
          echo "=== .so files ==="
          find target -name "*.so" -ls

      - name: Upload artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: clawfarm-masterpool-all
          path: |
            target/
          retention-days: 30
