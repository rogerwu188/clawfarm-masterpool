name: Build Anchor Program

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        run: |
          rustup update stable
          rustup default stable

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/stable/install)"

      - name: Add to PATH
        run: echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Install Anchor
        run: |
          npm install -g @coral-xyz/anchor-cli@latest

      - name: Show versions
        run: |
          solana --version
          anchor --version

      - name: Install Node.js dependencies
        run: npm install

      - name: Build Anchor program
        run: anchor build

      - name: List all build output
        run: |
          find target -name "*.so" -o -name "*keypair*" -o -name "*.json" 2>/dev/null | head -20
          ls -la target/deploy/ 2>/dev/null || echo "No deploy dir"

      - name: Upload compiled program (all deploy files)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: clawfarm-masterpool-deploy
          path: target/deploy/
          retention-days: 30

      - name: Display Program ID
        if: success()
        run: |
          if [ -f target/deploy/clawfarm_masterpool-keypair.json ]; then
            echo "Program ID:"
            cat target/deploy/clawfarm_masterpool-keypair.json | jq -r '.pubkey'
          else
            echo "Keypair not found, checking other locations..."
            find . -name "*keypair*.json" 2>/dev/null
          fi
