name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL 'https://release.anza.xyz/stable/install')"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH
          solana --version

      - name: Install Cargo BPF
        run: |
          cargo install cargo-bpf-clang 2>&1 || true
          cargo-bpf --version 2>&1 || true

      - name: Install npm dependencies
        run: |
          npm install
          ls -la

      - name: Build with cargo-bpf
        working-directory: .
        run: |
          cargo build-bpf --manifest-path Cargo.toml -o target/deploy/clawfarm_masterpool.so 2>&1 || echo "cargo-bpf failed, trying anchor"
          if [ ! -f target/deploy/clawfarm_masterpool.so ]; then
            anchor build 2>&1
          fi

      - name: List build outputs
        run: |
          echo "=== All files in target ==="
          find target -type f 2>/dev/null | head -30
          echo ""
          echo "=== .so files ==="
          find . -name "*.so" 2>/dev/null

      - name: Create artifact bundle
        run: |
          mkdir -p artifact-bundle
          cp -r target/ artifact-bundle/ 2>/dev/null || true
          ls -la artifact-bundle/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: clawfarm-build
          path: artifact-bundle/
