name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Disable caching
        uses: actions/cache/disable@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          cache: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL 'https://release.anza.xyz/stable/install')"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Install Anchor CLI
        run: |
          npm install -g @coral-xyz/anchor-cli
          anchor --version

      - name: Install dependencies
        run: npm install

      - name: Remove cached builds
        run: |
          rm -rf target
          rm -rf ~/.cargo/registry/cache
          rm -rf ~/.cargo/git/db

      - name: Build program
        run: |
          anchor build --no-cache 2>&1 || anchor build 2>&1

      - name: List output files
        run: |
          echo "=== Deploy folder ==="
          ls -la target/deploy/ 2>/dev/null || echo "No deploy"
          echo ""
          echo "=== .so files ==="
          find . -name "*.so" 2>/dev/null || echo "No .so"
          echo ""
          echo "=== All target files ==="
          find target -type f 2>/dev/null | head -20

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: program-artifacts
          path: target/
