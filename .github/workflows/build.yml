name: Build Anchor Program

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        run: |
          rustup update stable
          rustup default stable

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/stable/install)"

      - name: Add to PATH
        run: echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Install Anchor
        run: |
          npm install -g @coral-xyz/anchor-cli@latest

      - name: Show versions
        run: |
          solana --version
          anchor --version
          rustc --version

      - name: Install Node.js dependencies
        run: npm install

      - name: Build Anchor program
        run: anchor build

      - name: List build output
        run: |
          ls -la target/deploy/
          ls -la target/idl/

      - name: Upload compiled program
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: clawfarm-masterpool-so
          path: target/deploy/
          retention-days: 30

      - name: Display Program ID
        if: success()
        run: |
          echo "Program ID (from keypair):"
          cat target/deploy/clawfarm_masterpool-keypair.json | jq -r '.pubkey'
          echo ""
          echo "Program ID (from program):"
          solana address -k target/deploy/clawfarm_masterpool-keypair.json
