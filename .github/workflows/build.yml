name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL 'https://release.anza.xyz/stable/install')"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Install LLVM
        run: sudo apt-get install -y llvm

      - name: Install BPF dependencies
        run: |
          cargo install cargo-bpf-clang 2>/dev/null || true

      - name: Install Anchor
        run: npm install -g @coral-xyz/anchor-cli

      - name: Install dependencies
        run: npm install

      - name: Build with BPF
        run: |
          anchor build --bpfout target/deploy/clawfarm_masterpool.so 2>&1 || anchor build 2>&1

      - name: List all files
        run: |
          find . -type f \( -name "*.so" -o -name "*keypair*" \) 2>/dev/null
          ls -laR target/ 2>/dev/null | head -50

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: clawfarm-program
          path: target/
